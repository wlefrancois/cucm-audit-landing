<section class="section">
  <div class="container">
    <div id="scoreCard" class="card" style="margin-bottom:14px;"></div>

    <div id="actionCard" class="card" style="margin-bottom:14px;"></div>

    <div id="breakdownCard" class="card" style="margin-bottom:14px;"></div>

    <div id="weeklyCard" class="card" style="margin-bottom:18px;"></div>

      <div class="card">
        <div style="font-weight:700; font-size:18px;">Energy</div>
        <div class="micro muted" style="margin-top:4px;">Last 7 days</div>

          <canvas id="chartEnergy" height="180"></canvas>

      </div>

      <div class="card">
        <div style="font-weight:700; font-size:18px;">Sleep</div>
        <div class="micro muted" style="margin-top:4px;">Hours (last 7 days)</div>
        <div style="margin-top:10px;">
          <canvas id="chartSleep" height="180"></canvas>
        </div>
      </div>

      <div class="card">
        <div style="font-weight:700; font-size:18px;">Inflammation</div>
        <div class="micro muted" style="margin-top:4px;">Last 7 days</div>
        <div style="margin-top:10px;">
          <canvas id="chartInflam" height="180"></canvas>
        </div>
      </div>
    </div>

    <div id="logs"></div>
  </div>
</section>

<script type="module">
import { supabase, getUser, signOut } from "/js/app.js";
import { Chart } from "/js/vendor/chart.js";

const userLine = document.getElementById("userLine");
const scoreCard = document.getElementById("scoreCard");
const actionCard = document.getElementById("actionCard");
const breakdownCard = document.getElementById("breakdownCard");
const todayCard = document.getElementById("todayCard");
const stats = document.getElementById("stats");
const weeklyCard = document.getElementById("weeklyCard");
const insights = document.getElementById("insights");
const logsEl = document.getElementById("logs");

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut();
  window.location.href = "/app/";
});

function todayISODate() {
  return new Date().toISOString().slice(0, 10);
}

function avg(arr) {
  const v = arr.filter((x) => x != null && !Number.isNaN(x));
  if (!v.length) return null;
  return (v.reduce((a, b) => a + b, 0) / v.length).toFixed(1);
}

function trend(arr) {
  const v = arr.filter((x) => x != null && !Number.isNaN(x));
  if (v.length < 2) return `<span class="trend-flat">→ steady</span>`;

  const first = v[v.length - 1];
  const last = v[0];

  if (last > first) return `<span class="trend-up">▲ improving</span>`;
  if (last < first) return `<span class="trend-down">▼ declining</span>`;
  return `<span class="trend-flat">→ steady</span>`;
}

function escapeHtml(s) {
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function normalizeSleep(hours) {
  if (hours == null || Number.isNaN(Number(hours))) return 0;
  const h = Number(hours);
  if (h >= 8) return 25;
  if (h >= 7) return 22;
  if (h >= 6) return 18;
  if (h >= 5) return 12;
  return 6;
}

function normalizeTenScale(value, maxPoints) {
  if (value == null || Number.isNaN(Number(value))) return 0;
  return (Number(value) / 10) * maxPoints;
}

function normalizeReverseTenScale(value, maxPoints) {
  if (value == null || Number.isNaN(Number(value))) return 0;
  return ((11 - Number(value)) / 10) * maxPoints;
}

function normalizeWater(oz) {
  if (oz == null || Number.isNaN(Number(oz))) return 0;
  const w = Number(oz);
  if (w >= 100) return 5;
  if (w >= 80) return 4;
  if (w >= 60) return 3;
  if (w >= 40) return 2;
  return 1;
}

function computeScore(row) {
  const parts = {
    sleep: normalizeSleep(row.sleep_hours),
    energy: normalizeTenScale(row.energy, 25),
    inflammation: normalizeReverseTenScale(row.inflammation, 20),
    digestion: normalizeTenScale(row.digestion, 15),
    mood: normalizeTenScale(row.mood, 10),
    water: normalizeWater(row.water_oz)
  };

  const total = Math.round(
    parts.sleep +
    parts.energy +
    parts.inflammation +
    parts.digestion +
    parts.mood +
    parts.water
  );

  return { total, parts };
}

function categorizeParts(parts) {
  const helped = [];
  const hurt = [];

  for (const [key, value] of Object.entries(parts)) {
    const max =
      key === "sleep" ? 25 :
      key === "energy" ? 25 :
      key === "inflammation" ? 20 :
      key === "digestion" ? 15 :
      key === "mood" ? 10 :
      key === "water" ? 5 : 10;

    const ratio = value / max;

    if (ratio >= 0.6) helped.push(key);
    if (ratio <= 0.4) hurt.push(key);
  }

  return { helped, hurt };
}

function getRecommendation(limiter) {
  switch (limiter) {
    case "sleep":
      return {
        title: "Today's Recommendation",
        body: "Sleep is limiting your metabolic score. Aim for 7–8 hours tonight and reduce late-night stimulation."
      };
    case "energy":
      return {
        title: "Today's Recommendation",
        body: "Energy is running low. Keep today simpler, reduce unnecessary stress, and support recovery."
      };
    case "inflammation":
      return {
        title: "Today's Recommendation",
        body: "Inflammation is limiting your score. Focus on recovery, lower training intensity, and keep food choices clean and consistent."
      };
    case "digestion":
      return {
        title: "Today's Recommendation",
        body: "Digestion is limiting your score. Keep meals simple today and avoid stacking too many variables."
      };
    case "mood":
      return {
        title: "Today's Recommendation",
        body: "Mood is weighing on your readiness. Reduce friction today and focus on a calm, steady routine."
      };
    case "hydration":
      return {
        title: "Today's Recommendation",
        body: "Hydration is limiting your score. Increase water intake and aim for at least 80 oz today."
      };
    default:
      return {
        title: "Today's Recommendation",
        body: "Log consistently so CCC can generate more accurate recommendations."
      };
  }
}

function getLimiter(parts) {
  const entries = [
    ["sleep", parts.sleep],
    ["energy", parts.energy],
    ["inflammation", parts.inflammation],
    ["digestion", parts.digestion],
    ["mood", parts.mood],
    ["hydration", parts.water]
  ];
  entries.sort((a, b) => a[1] - b[1]);
  return entries[0][0];
}

function getScoreBand(score) {
  if (score >= 80) {
    return {
      label: "Elite",
      color1: "#35d07f",
      color2: "#7cf0a7"
    };
  }
  if (score >= 60) {
    return {
      label: "Good",
      color1: "#5ea2ff",
      color2: "#7c8cff"
    };
  }
  if (score >= 40) {
    return {
      label: "Recover",
      color1: "#ffb347",
      color2: "#ffd089"
    };
  }
  return {
    label: "Low",
    color1: "#ff6b6b",
    color2: "#ff9a9a"
  };
}

function corrSleepEnergy(rows) {
  const pairs = rows
    .filter((r) => r.sleep_hours != null && r.energy != null)
    .map((r) => [Number(r.sleep_hours), Number(r.energy)])
    .filter(([a, b]) => !Number.isNaN(a) && !Number.isNaN(b));

  if (pairs.length < 3) return null;

  const xs = pairs.map((p) => p[0]);
  const ys = pairs.map((p) => p[1]);

  const xAvg = Number(avg(xs));
  const yAvg = Number(avg(ys));

  let num = 0;
  let denX = 0;
  let denY = 0;

  for (let i = 0; i < pairs.length; i++) {
    const dx = xs[i] - xAvg;
    const dy = ys[i] - yAvg;
    num += dx * dy;
    denX += dx * dx;
    denY += dy * dy;
  }

  const corr = num / Math.sqrt(denX * denY);
  if (!Number.isFinite(corr)) return null;

  if (corr > 0.4) return "Sleep tends to correlate with higher energy for you.";
  if (corr < -0.4) return "More sleep correlates with lower energy for you. Check sleep quality or timing.";
  return null;
}

function buildLineChart(canvasId, label, labels, values, yMin = null, yMax = null) {
  const el = document.getElementById(canvasId);
  if (!el) return;

  if (el._chart) el._chart.destroy();

  el._chart = new Chart(el, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label,
          data: values,
          tension: 0.35,
          spanGaps: true,
          pointRadius: 4,
          pointHoverRadius: 6
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        x: { ticks: { maxRotation: 0 } },
        y: {
          beginAtZero: false,
          suggestedMin: yMin ?? undefined,
          suggestedMax: yMax ?? undefined
        }
      }
    }
  });
}

async function load() {
  const user = await getUser();
  if (!user) {
    window.location.href = "/app/";
    return;
  }

  userLine.textContent = `Logged in as ${user.email}`;

  const { data, error } = await supabase
    .from("daily_logs")
    .select("*")
    .order("log_date", { ascending: false })
    .limit(7);

  if (error) {
    scoreCard.textContent = `Error loading logs: ${error.message}`;
    return;
  }

  const rows = data || [];
  const today = todayISODate();
  const todayLog = rows.find((r) => r.log_date === today);

 scoreCard.innerHTML = `
  <div style="display:flex; justify-content:space-between; gap:24px; flex-wrap:wrap; align-items:center;">
    
    <div style="display:flex; align-items:center; gap:22px; flex-wrap:wrap;">
      <div
        class="score-gauge"
        style="
          --score:${todayScore.total};
          --g1:${band.color1};
          --g2:${band.color2};
        "
      >
        <div class="score-gauge__inner">
          <div class="score-gauge__value">${todayScore.total}</div>
          <div class="score-gauge__sub">/ 100</div>
        </div>
      </div>

      <div>
        <div class="micro muted" style="text-transform:uppercase; letter-spacing:.08em;">
          Metabolic Readiness • ${band.label}
        </div>

        <div class="micro muted" style="margin-top:10px;">
          ${delta == null ? "First score logged" : delta > 0 ? `▲ +${delta} from last log` : delta < 0 ? `▼ ${delta} from last log` : "→ unchanged from last log"}
        </div>
      </div>
    </div>

    <div style="min-width:280px;">
      <div style="height:10px; border-radius:999px; background: rgba(255,255,255,0.08); overflow:hidden; margin-bottom:14px;">
        <div style="width:${todayScore.total}%; height:100%; border-radius:999px; background: linear-gradient(90deg, ${band.color1}, ${band.color2});"></div>
      </div>

      <div class="micro muted" style="line-height:1.7;">
        <div><strong>Main limiter:</strong> ${limiter}</div>
        <div>Sleep: ${todayScore.parts.sleep.toFixed(0)}/25</div>
        <div>Energy: ${todayScore.parts.energy.toFixed(0)}/25</div>
        <div>Inflammation: ${todayScore.parts.inflammation.toFixed(0)}/20</div>
        <div>Digestion: ${todayScore.parts.digestion.toFixed(0)}/15</div>
        <div>Mood: ${todayScore.parts.mood.toFixed(0)}/10</div>
        <div>Hydration: ${todayScore.parts.water.toFixed(0)}/5</div>
      </div>
    </div>
  </div>
`;
    actionCard.innerHTML = `
      <div style="display:flex; gap:14px; align-items:flex-start;">
        <div style="width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; background: rgba(94,162,255,0.14); border: 1px solid rgba(94,162,255,0.28); font-size:18px;">
          ✦
        </div>

        <div>
          <strong style="display:block; margin-bottom:6px;">${recommendation.title}</strong>
          <div class="micro muted" style="line-height:1.6;">
            ${recommendation.body}
          </div>
        </div>
      </div>
    `;

    breakdownCard.innerHTML = `
      <strong style="display:block; margin-bottom:10px;">Score Breakdown</strong>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px;">
        <div>
          <div class="micro muted" style="margin-bottom:8px;">Helped Your Score</div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            ${
              helped.length
                ? helped.map(x => `
                  <div style="padding:8px 10px; border-radius:12px; background: rgba(53,208,127,0.08); border:1px solid rgba(53,208,127,0.18);">
                    + ${x}
                  </div>
                `).join("")
                : `<div class="micro muted">—</div>`
            }
          </div>
        </div>

        <div>
          <div class="micro muted" style="margin-bottom:8px;">Limited Your Score</div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            ${
              hurt.length
                ? hurt.map(x => `
                  <div style="padding:8px 10px; border-radius:12px; background: rgba(255,179,71,0.08); border:1px solid rgba(255,179,71,0.18);">
                    - ${x}
                  </div>
                `).join("")
                : `<div class="micro muted">—</div>`
            }
          </div>
        </div>
      </div>
    `;

    scoreCard.innerHTML = `
      <div style="display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap; align-items:center;">
        <div>
          <div class="micro muted" style="text-transform:uppercase; letter-spacing:.08em;">Metabolic Readiness • ${band.label}</div>
          <div style="display:flex; align-items:end; gap:10px; margin-top:8px;">
            <div style="font-size:64px; font-weight:800; line-height:1; letter-spacing:-0.03em;">${todayScore.total}</div>
            <div style="font-size:22px; opacity:.7; padding-bottom:8px;">/ 100</div>
          </div>
          <div class="micro muted" style="margin-top:10px;">
            ${delta == null ? "First score logged" : delta > 0 ? `▲ +${delta} from last log` : delta < 0 ? `▼ ${delta} from last log` : "→ unchanged from last log"}
          </div>
        </div>

        <div style="min-width:280px;">
          <div style="height:10px; border-radius:999px; background: rgba(255,255,255,0.08); overflow:hidden; margin-bottom:14px;">
            <div style="width:${todayScore.total}%; height:100%; border-radius:999px; background: linear-gradient(90deg, ${band.color1}, ${band.color2});"></div>
          </div>

          <div class="micro muted" style="line-height:1.7;">
            <div><strong>Main limiter:</strong> ${limiter}</div>
            <div>Sleep: ${todayScore.parts.sleep.toFixed(0)}/25</div>
            <div>Energy: ${todayScore.parts.energy.toFixed(0)}/25</div>
            <div>Inflammation: ${todayScore.parts.inflammation.toFixed(0)}/20</div>
            <div>Digestion: ${todayScore.parts.digestion.toFixed(0)}/15</div>
            <div>Mood: ${todayScore.parts.mood.toFixed(0)}/10</div>
            <div>Hydration: ${todayScore.parts.water.toFixed(0)}/5</div>
          </div>
        </div>
      </div>
    `;
  } else {
    actionCard.innerHTML = `
      <strong>Today's Recommendation</strong>
      <div class="micro muted" style="margin-top:8px;">
        Log today to generate your first personalized recommendation.
      </div>
    `;

    breakdownCard.innerHTML = `
      <strong>Score Breakdown</strong>
      <div class="micro muted" style="margin-top:8px;">
        Log today to see what helped and what limited your score.
      </div>
    `;

    scoreCard.innerHTML = `
      <strong>No readiness score yet</strong>
      <div class="micro muted" style="margin-top:6px;">
        Log today to generate your first Metabolic Readiness score.
      </div>
    `;
  }

  todayCard.innerHTML = todayLog
    ? `<strong>Today logged ✅</strong>
       <div class="micro muted" style="margin-top:6px;">
         Energy ${todayLog.energy ?? "-"} • Sleep ${todayLog.sleep_hours ?? "-"} • Water ${todayLog.water_oz ?? "-"}
       </div>`
    : `<strong>Today not logged yet</strong>
       <div class="micro muted" style="margin-top:6px;">Click “Log Today” to record your day.</div>`;

  const energy = rows.map((r) => r.energy == null ? null : Number(r.energy));
  const sleep = rows.map((r) => r.sleep_hours == null ? null : Number(r.sleep_hours));
  const inflam = rows.map((r) => r.inflammation == null ? null : Number(r.inflammation));
  const scores = rows.map((r) => computeScore(r).total);

  stats.innerHTML = `
    <div class="card">
      <strong>Readiness (avg)</strong>
      <div class="lead">${avg(scores) ?? "-"}</div>
      <div class="micro muted">${trend(scores)}</div>
    </div>

    <div class="card">
      <strong>Sleep (avg hrs)</strong>
      <div class="lead">${avg(sleep) ?? "-"}</div>
      <div class="micro muted">${trend(sleep)}</div>
    </div>

    <div class="card">
      <strong>Inflammation (avg)</strong>
      <div class="lead">${avg(inflam) ?? "-"}</div>
      <div class="micro muted">${trend(inflam)}</div>
    </div>
  `;

  if (rows.length > 0) {
    const avgScore = avg(scores);

    let best = rows[0];
    rows.forEach(r => {
      if (computeScore(r).total > computeScore(best).total) best = r;
    });

    const bestScore = computeScore(best).total;

    const limiters = rows.map(r => getLimiter(computeScore(r).parts));
    const limiterCounts = {};
    limiters.forEach(l => {
      limiterCounts[l] = (limiterCounts[l] || 0) + 1;
    });

    let mostCommonLimiter = null;
    let maxCount = 0;

    for (const key in limiterCounts) {
      if (limiterCounts[key] > maxCount) {
        mostCommonLimiter = key;
        maxCount = limiterCounts[key];
      }
    }

    weeklyCard.innerHTML = `
      <strong>Weekly Report</strong>

      <div class="cards cards--3" style="margin-top:14px;">
        <div>
          <div class="micro muted">Average Score</div>
          <div style="font-size:28px;font-weight:700;">${avgScore}</div>
        </div>

        <div>
          <div class="micro muted">Best Day</div>
          <div style="font-size:18px;font-weight:600;">
            ${best.log_date} (${bestScore})
          </div>
        </div>

        <div>
          <div class="micro muted">Most Common Limiter</div>
          <div style="font-size:18px;font-weight:600;">
            ${mostCommonLimiter || "-"}
          </div>
        </div>
      </div>
    `;
  } else {
    weeklyCard.innerHTML = `
      <strong>Weekly Report</strong>
      <div class="micro muted" style="margin-top:8px;">
        Log consistently this week to generate your weekly report.
      </div>
    `;
  }

  let bestScore = null;
  rows.forEach((r) => {
    const score = computeScore(r).total;
    if (!bestScore || score > bestScore.score) bestScore = { row: r, score };
  });

  let insightHTML = `<strong>Insights</strong><div class="micro muted" style="margin-top:6px; line-height:1.5;">`;
  if (bestScore) insightHTML += `Best readiness day: ${bestScore.row.log_date} (${bestScore.score}/100)<br>`;

  const sleepInsight = corrSleepEnergy(rows);
  if (sleepInsight) insightHTML += `${sleepInsight}<br>`;

  if (todayLog) {
    const limiter = getLimiter(computeScore(todayLog).parts);
    insightHTML += `Biggest opportunity today: improve ${limiter}.<br>`;
  }

  insightHTML += `</div>`;
  insights.innerHTML = insightHTML;

  const asc = [...rows].sort((a, b) => (a.log_date > b.log_date ? 1 : -1));
  const labels = asc.map((r) => r.log_date.slice(5));

  buildLineChart(
    "chartEnergy",
    "Energy",
    labels,
    asc.map((r) => (r.energy == null ? null : Number(r.energy))),
    1, 10
  );

  buildLineChart(
    "chartSleep",
    "Sleep Hours",
    labels,
    asc.map((r) => (r.sleep_hours == null ? null : Number(r.sleep_hours))),
    0, 10
  );

  buildLineChart(
    "chartInflam",
    "Inflammation",
    labels,
    asc.map((r) => (r.inflammation == null ? null : Number(r.inflammation))),
    1, 10
  );

  logsEl.innerHTML = rows
    .map((r) => {
      const score = computeScore(r).total;
      return `
        <div class="card" style="margin-bottom:10px;">
          <div style="display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;">
            <strong>${r.log_date}</strong>
            <span class="micro muted">
              Score: ${score}/100 • Energy: ${r.energy ?? "-"} • Sleep: ${r.sleep_hours ?? "-"} • Water: ${r.water_oz ?? "-"}
            </span>
          </div>
          ${r.notes ? `<div class="micro muted" style="margin-top:6px;">${escapeHtml(r.notes).slice(0,180)}</div>` : ""}
        </div>
      `;
    })
    .join("") || `<div class="card">No logs yet. Click “Log Today”.</div>`;
}

load();
</script>
