<section class="page-hero">
  <div class="container">
    <h1>Dashboard</h1>
    <p class="lead">Your metabolic signals over the last 7 days.</p>

    <div class="hero__cta">
      <a class="btn btn--primary" href="/app/log/">Log Today</a>
      <button class="btn btn--ghost" id="logoutBtn" type="button">Logout</button>
    </div>

    <p id="userLine" class="micro muted" style="margin-top:10px;"></p>
  </div>
</section>

<section class="section">
  <div class="container">

   <div id="scoreCard" class="card" style="margin-bottom:14px;"></div>

<div id="actionCard" class="card" style="margin-bottom:14px;"></div>

<div id="todayCard" class="card" style="margin-bottom:14px;"></div>

    <div id="stats" class="cards cards--3" style="margin-bottom:18px;"></div>

    <div id="insights" class="card" style="margin-bottom:18px;"></div>

    <div class="cards cards--3" style="margin-bottom:18px;">
      <div class="card">
        <strong>Energy</strong>
        <div class="micro muted" style="margin-top:6px;">Last 7 days</div>
        <div style="margin-top:10px;">
          <canvas id="chartEnergy" height="180"></canvas>
        </div>
      </div>

      <div class="card">
        <strong>Sleep</strong>
        <div class="micro muted" style="margin-top:6px;">Hours (last 7 days)</div>
        <div style="margin-top:10px;">
          <canvas id="chartSleep" height="180"></canvas>
        </div>
      </div>

      <div class="card">
        <strong>Inflammation</strong>
        <div class="micro muted" style="margin-top:6px;">Last 7 days</div>
        <div style="margin-top:10px;">
          <canvas id="chartInflam" height="180"></canvas>
        </div>
      </div>
    </div>

    <div id="logs"></div>

  </div>
</section>

<script type="module">
import { supabase, getUser, signOut } from "/js/app.js";
import { Chart } from "/js/vendor/chart.js";

const userLine = document.getElementById("userLine");
const scoreCard = document.getElementById("scoreCard");
const actionCard = document.getElementById("actionCard");
const todayCard = document.getElementById("todayCard");
const stats = document.getElementById("stats");
const insights = document.getElementById("insights");
const logsEl = document.getElementById("logs");

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut();
  window.location.href = "/app/";
});

function todayISODate() {
  return new Date().toISOString().slice(0, 10);
}

function avg(arr) {
  const v = arr.filter((x) => x != null && !Number.isNaN(x));
  if (!v.length) return null;
  return (v.reduce((a, b) => a + b, 0) / v.length).toFixed(1);
}

function trend(arr) {
  const v = arr.filter((x) => x != null && !Number.isNaN(x));
  if (v.length < 2) return "";
  const first = v[v.length - 1];
  const last = v[0];
  if (last > first) return "▲ improving";
  if (last < first) return "▼ declining";
  return "→ steady";
}

function escapeHtml(s) {
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function normalizeSleep(hours) {
  if (hours == null || Number.isNaN(Number(hours))) return 0;
  const h = Number(hours);
  if (h >= 8) return 25;
  if (h >= 7) return 22;
  if (h >= 6) return 18;
  if (h >= 5) return 12;
  return 6;
}

function normalizeTenScale(value, maxPoints) {
  if (value == null || Number.isNaN(Number(value))) return 0;
  return (Number(value) / 10) * maxPoints;
}

function normalizeReverseTenScale(value, maxPoints) {
  if (value == null || Number.isNaN(Number(value))) return 0;
  return ((11 - Number(value)) / 10) * maxPoints;
}

function normalizeWater(oz) {
  if (oz == null || Number.isNaN(Number(oz))) return 0;
  const w = Number(oz);
  if (w >= 100) return 5;
  if (w >= 80) return 4;
  if (w >= 60) return 3;
  if (w >= 40) return 2;
  return 1;
}

function computeScore(row) {
  const parts = {
    sleep: normalizeSleep(row.sleep_hours),
    energy: normalizeTenScale(row.energy, 25),
    inflammation: normalizeReverseTenScale(row.inflammation, 20),
    digestion: normalizeTenScale(row.digestion, 15),
    mood: normalizeTenScale(row.mood, 10),
    water: normalizeWater(row.water_oz)
  };

  const total = Math.round(
    parts.sleep +
    parts.energy +
    parts.inflammation +
    parts.digestion +
    parts.mood +
    parts.water
  );

  return { total, parts };
}

function getLimiter(parts) {
  function getRecommendation(limiter) {
  switch (limiter) {
    case "sleep":
      return {
        title: "Today's Recommendation",
        body: "Sleep is limiting your metabolic score. Aim for 7–8 hours tonight and reduce late-night stimulation."
      };
    case "energy":
      return {
        title: "Today's Recommendation",
        body: "Energy is running low. Keep today simpler, reduce unnecessary stress, and support recovery."
      };
    case "inflammation":
      return {
        title: "Today's Recommendation",
        body: "Inflammation is limiting your score. Focus on recovery, lower training intensity, and keep food choices clean and consistent."
      };
    case "digestion":
      return {
        title: "Today's Recommendation",
        body: "Digestion is limiting your score. Keep meals simple today and avoid stacking too many variables."
      };
    case "mood":
      return {
        title: "Today's Recommendation",
        body: "Mood is weighing on your readiness. Reduce friction today and focus on a calm, steady routine."
      };
    case "hydration":
      return {
        title: "Today's Recommendation",
        body: "Hydration is limiting your score. Increase water intake and aim for at least 80 oz today."
      };
    default:
      return {
        title: "Today's Recommendation",
        body: "Log consistently so CCC can generate more accurate recommendations."
      };
  }
}
  const entries = [
    ["sleep", parts.sleep],
    ["energy", parts.energy],
    ["inflammation", parts.inflammation],
    ["digestion", parts.digestion],
    ["mood", parts.mood],
    ["hydration", parts.water]
  ];
  entries.sort((a, b) => a[1] - b[1]);
  return entries[0][0];
}

function corrSleepEnergy(rows) {
  const pairs = rows
    .filter((r) => r.sleep_hours != null && r.energy != null)
    .map((r) => [Number(r.sleep_hours), Number(r.energy)])
    .filter(([a, b]) => !Number.isNaN(a) && !Number.isNaN(b));

  if (pairs.length < 3) return null;

  const xs = pairs.map((p) => p[0]);
  const ys = pairs.map((p) => p[1]);

  const xAvg = Number(avg(xs));
  const yAvg = Number(avg(ys));

  let num = 0, denX = 0, denY = 0;
  for (let i = 0; i < pairs.length; i++) {
    const dx = xs[i] - xAvg;
    const dy = ys[i] - yAvg;
    num += dx * dy;
    denX += dx * dx;
    denY += dy * dy;
  }

  const corr = num / Math.sqrt(denX * denY);
  if (!Number.isFinite(corr)) return null;

  if (corr > 0.4) return "Sleep tends to correlate with higher energy for you.";
  if (corr < -0.4) return "More sleep correlates with lower energy for you. Check sleep quality or timing.";
  return null;
}

function buildLineChart(canvasId, label, labels, values, yMin = null, yMax = null) {
  const el = document.getElementById(canvasId);
  if (!el) return;

  if (el._chart) el._chart.destroy();

  el._chart = new Chart(el, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label,
          data: values,
          tension: 0.35,
          spanGaps: true,
          pointRadius: 4,
          pointHoverRadius: 6
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        x: { ticks: { maxRotation: 0 } },
        y: {
          beginAtZero: false,
          suggestedMin: yMin ?? undefined,
          suggestedMax: yMax ?? undefined
        }
      }
    }
  });
}

async function load() {
  const user = await getUser();
  if (!user) {
    window.location.href = "/app/";
    return;
  }

  userLine.textContent = `Logged in as ${user.email}`;

  const { data, error } = await supabase
    .from("daily_logs")
    .select("*")
    .order("log_date", { ascending: false })
    .limit(7);

  if (error) {
    scoreCard.textContent = `Error loading logs: ${error.message}`;
    return;
  }

  const rows = data || [];
  const today = todayISODate();
  const todayLog = rows.find((r) => r.log_date === today);

  if (todayLog) {
    const todayScore = computeScore(todayLog);
    const yesterdayLog = rows.find((r) => r.log_date !== today);
    const yesterdayScore = yesterdayLog ? computeScore(yesterdayLog).total : null;
    const delta = yesterdayScore != null ? todayScore.total - yesterdayScore : null;
    const limiter = getLimiter(todayScore.parts);

    scoreCard.innerHTML = `
      <div style="display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; align-items:end;">
        <div>
          <div class="micro muted">Metabolic Readiness</div>
          <div style="font-size:48px; font-weight:700; line-height:1;">${todayScore.total}<span style="font-size:20px; opacity:.7;"> / 100</span></div>
          <div class="micro muted" style="margin-top:8px;">
            ${delta == null ? "First score logged" : delta > 0 ? `▲ +${delta} from last log` : delta < 0 ? `▼ ${delta} from last log` : "→ unchanged from last log"}
          </div>
        </div>

        <div class="micro muted" style="line-height:1.6;">
          <div><strong>Main limiter:</strong> ${limiter}</div>
          <div>Sleep: ${todayScore.parts.sleep.toFixed(0)}/25</div>
          <div>Energy: ${todayScore.parts.energy.toFixed(0)}/25</div>
          <div>Inflammation: ${todayScore.parts.inflammation.toFixed(0)}/20</div>
          <div>Digestion: ${todayScore.parts.digestion.toFixed(0)}/15</div>
          <div>Mood: ${todayScore.parts.mood.toFixed(0)}/10</div>
          <div>Hydration: ${todayScore.parts.water.toFixed(0)}/5</div>
        </div>
      </div>
    `;
  } else {
    scoreCard.innerHTML = `
      <strong>No readiness score yet</strong>
      <div class="micro muted" style="margin-top:6px;">
        Log today to generate your first Metabolic Readiness score.
      </div>
    `;
  }

  todayCard.innerHTML = todayLog
    ? `<strong>Today logged ✅</strong>
       <div class="micro muted" style="margin-top:6px;">
         Energy ${todayLog.energy ?? "-"} • Sleep ${todayLog.sleep_hours ?? "-"} • Water ${todayLog.water_oz ?? "-"}
       </div>`
    : `<strong>Today not logged yet</strong>
       <div class="micro muted" style="margin-top:6px;">Click “Log Today” to record your day.</div>`;

  const energy = rows.map((r) => r.energy == null ? null : Number(r.energy));
  const sleep = rows.map((r) => r.sleep_hours == null ? null : Number(r.sleep_hours));
  const inflam = rows.map((r) => r.inflammation == null ? null : Number(r.inflammation));
  const scores = rows.map((r) => computeScore(r).total);

  stats.innerHTML = `
    <div class="card">
      <strong>Readiness (avg)</strong>
      <div class="lead">${avg(scores) ?? "-"}</div>
      <div class="micro muted">${trend(scores)}</div>
    </div>

    <div class="card">
      <strong>Sleep (avg hrs)</strong>
      <div class="lead">${avg(sleep) ?? "-"}</div>
      <div class="micro muted">${trend(sleep)}</div>
    </div>

    <div class="card">
      <strong>Inflammation (avg)</strong>
      <div class="lead">${avg(inflam) ?? "-"}</div>
      <div class="micro muted">${trend(inflam)}</div>
    </div>
  `;

  let bestScore = null;
  rows.forEach((r) => {
    const score = computeScore(r).total;
    if (!bestScore || score > bestScore.score) bestScore = { row: r, score };
  });

  let insightHTML = `<strong>Insights</strong><div class="micro muted" style="margin-top:6px; line-height:1.5;">`;
  if (bestScore) insightHTML += `Best readiness day: ${bestScore.row.log_date} (${bestScore.score}/100)<br>`;

  const sleepInsight = corrSleepEnergy(rows);
  if (sleepInsight) insightHTML += `${sleepInsight}<br>`;

  if (todayLog) {
    const limiter = getLimiter(computeScore(todayLog).parts);
    insightHTML += `Biggest opportunity today: improve ${limiter}.<br>`;
  }

  insightHTML += `</div>`;
  insights.innerHTML = insightHTML;

  const asc = [...rows].sort((a, b) => (a.log_date > b.log_date ? 1 : -1));
  const labels = asc.map((r) => r.log_date.slice(5));

  buildLineChart(
    "chartEnergy",
    "Energy",
    labels,
    asc.map((r) => (r.energy == null ? null : Number(r.energy))),
    1, 10
  );

  buildLineChart(
    "chartSleep",
    "Sleep Hours",
    labels,
    asc.map((r) => (r.sleep_hours == null ? null : Number(r.sleep_hours))),
    0, 10
  );

  buildLineChart(
    "chartInflam",
    "Inflammation",
    labels,
    asc.map((r) => (r.inflammation == null ? null : Number(r.inflammation))),
    1, 10
  );

  logsEl.innerHTML = rows
    .map((r) => {
      const score = computeScore(r).total;
      return `
        <div class="card" style="margin-bottom:10px;">
          <div style="display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;">
            <strong>${r.log_date}</strong>
            <span class="micro muted">
              Score: ${score}/100 • Energy: ${r.energy ?? "-"} • Sleep: ${r.sleep_hours ?? "-"} • Water: ${r.water_oz ?? "-"}
            </span>
          </div>
          ${r.notes ? `<div class="micro muted" style="margin-top:6px;">${escapeHtml(r.notes).slice(0,180)}</div>` : ""}
        </div>
      `;
    })
    .join("") || `<div class="card">No logs yet. Click “Log Today”.</div>`;
}

load();
</script>
