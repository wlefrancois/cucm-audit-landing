<section class="page-hero">
  <div class="container">
    <h1>Dashboard</h1>
    <p class="lead">Your metabolic signals over the last 7 days.</p>

    <div class="hero__cta">
      <a class="btn btn--primary" href="/app/log/">Log Today</a>
      <button class="btn btn--ghost" id="logoutBtn" type="button">Logout</button>
    </div>

    <p id="userLine" class="micro muted" style="margin-top:10px;"></p>
  </div>
</section>

<section class="section">
  <div class="container">

    <div id="todayCard" class="card" style="margin-bottom:14px;"></div>

    <div id="stats" class="cards cards--3" style="margin-bottom:18px;"></div>

    <div id="insights" class="card" style="margin-bottom:18px;"></div>

    <div id="logs"></div>

  </div>
</section>

<script type="module">

import { supabase, getUser, signOut } from "/js/app.js";

const userLine = document.getElementById("userLine");
const todayCard = document.getElementById("todayCard");
const stats = document.getElementById("stats");
const insights = document.getElementById("insights");
const logsEl = document.getElementById("logs");

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut();
  window.location.href = "/app/";
});

function todayISODate() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function avg(arr){
  const v = arr.filter(x=>x!=null);
  if(!v.length) return null;
  return (v.reduce((a,b)=>a+b,0)/v.length).toFixed(1);
}

function trend(arr){
  if(arr.length < 2) return "";
  const first = arr[arr.length-1];
  const last = arr[0];

  if(last > first) return "▲ improving";
  if(last < first) return "▼ declining";
  return "→ steady";
}

function corrSleepEnergy(rows){

  const pairs = rows
    .filter(r=>r.sleep_hours && r.energy)
    .map(r=>[r.sleep_hours, r.energy]);

  if(pairs.length < 3) return null;

  const sleep = pairs.map(p=>p[0]);
  const energy = pairs.map(p=>p[1]);

  const sleepAvg = avg(sleep);
  const energyAvg = avg(energy);

  let num = 0;
  let denA = 0;
  let denB = 0;

  for(let i=0;i<pairs.length;i++){
    const a = sleep[i]-sleepAvg;
    const b = energy[i]-energyAvg;
    num += a*b;
    denA += a*a;
    denB += b*b;
  }

  const corr = num/Math.sqrt(denA*denB);

  if(corr > 0.4) return "More sleep tends to increase your energy.";
  if(corr < -0.4) return "More sleep may correlate with lower energy (check sleep quality).";
  return null;
}

async function load(){

  const user = await getUser();

  if(!user){
    window.location.href="/app/";
    return;
  }

  userLine.textContent = `Logged in as ${user.email}`;

  const { data, error } = await supabase
    .from("daily_logs")
    .select("*")
    .order("log_date",{ascending:false})
    .limit(7);

  if(error){
    todayCard.textContent = error.message;
    return;
  }

  const today = todayISODate();
  const todayLog = data.find(r=>r.log_date===today);

  todayCard.innerHTML = todayLog
  ? `<strong>Today logged ✅</strong>
     <div class="micro muted" style="margin-top:6px;">
     Energy ${todayLog.energy ?? "-"} • Sleep ${todayLog.sleep_hours ?? "-"} • Water ${todayLog.water_oz ?? "-"}
     </div>`
  : `<strong>Today not logged yet</strong>
     <div class="micro muted" style="margin-top:6px;">
     Click “Log Today” to record your day.
     </div>`;

  const energy = data.map(r=>r.energy);
  const sleep = data.map(r=>r.sleep_hours);
  const digestion = data.map(r=>r.digestion);
  const inflammation = data.map(r=>r.inflammation);

  stats.innerHTML = `

  <div class="card">
    <strong>Energy</strong>
    <div class="lead">${avg(energy) ?? "-"}</div>
    <div class="micro muted">${trend(energy)}</div>
  </div>

  <div class="card">
    <strong>Sleep</strong>
    <div class="lead">${avg(sleep) ?? "-"}</div>
    <div class="micro muted">${trend(sleep)}</div>
  </div>

  <div class="card">
    <strong>Inflammation</strong>
    <div class="lead">${avg(inflammation) ?? "-"}</div>
    <div class="micro muted">${trend(inflammation)}</div>
  </div>
  `;

  let bestEnergy = null;
  let worstInflam = null;

  data.forEach(r=>{
    if(r.energy && (!bestEnergy || r.energy>bestEnergy.energy))
      bestEnergy=r;

    if(r.inflammation && (!worstInflam || r.inflammation<worstInflam.inflammation))
      worstInflam=r;
  });

  let insightHTML = `<strong>Insights</strong><div class="micro muted" style="margin-top:6px;">`;

  if(bestEnergy)
    insightHTML += `Best energy day: ${bestEnergy.log_date} (${bestEnergy.energy})<br>`;

  if(worstInflam)
    insightHTML += `Lowest inflammation day: ${worstInflam.log_date} (${worstInflam.inflammation})<br>`;

  const sleepInsight = corrSleepEnergy(data);

  if(sleepInsight)
    insightHTML += `${sleepInsight}<br>`;

  insightHTML += "</div>";

  insights.innerHTML = insightHTML;

  logsEl.innerHTML = data.map(r=>`
    <div class="card" style="margin-bottom:10px;">
      <strong>${r.log_date}</strong><br>
      Energy ${r.energy ?? "-"} • Sleep ${r.sleep_hours ?? "-"} • Water ${r.water_oz ?? "-"}
    </div>
  `).join("");

}

load();

</script>
